- defaults:
    link:
      create: true
      relink: true

- create:
  - ~/.config

- clean: ['~']

- link:
    ~/.dotfiles: "" 
    ~/.zshenv: 
      path: .config/zsh/.zshenv
      force: true
    ~/.config/zsh:
      path: .config/zsh
      force: true
    ~/.config/nvim: .config/nvim
    ~/.config/kitty: 
      force: true
      path: .config/kitty
    ~/.Brewfile:
      if: "[ `uname` = Darwin ]"
      path: macos/Brewfile
    ~/.config/karabiner:
      force: true
      path: .config/karabiner
    ~/.claude/CLAUDE.md:
      path: .config/claude/CLAUDE.md
      force: true
    ~/.claude/statusline.sh:
      path: .config/claude/statusline.sh
      force: true
    ~/.claude/hooks:
      path: .config/claude/hooks
      force: true

- shell:
  - [git submodule update --init --recursive, Installing submodules]
